<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaxFrontier | Collecte</title>
    <style>
        :root { --primary: #1768b9; --success: #30b969; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(141, 0, 0, 0.342); max-width: 450px; width: 100%; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box;}
        input:focus, select:focus { border-color: var(--success); outline: none; }
        button { background-color: var(--success); color: rgba(255, 255, 255, 0.829); padding: 14px; border: none; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:hover { background-color: #226d41; }
    </style>
</head>
<body>

<div class="container">
    <h2>Collecte Vaccination</h2>
    
    <form action="/api/vacciner" method="POST">
        
        <div class="group">
            <label>Nom de l'enfant</label>
            <input type="text" name="nomEnfant" required placeholder="Nom et Prénom">
        </div>

        <div class="group">
            <label>Date de Naissance</label>
            <input type="date" name="dateNaissance" required>
        </div>

        <div class="group">
            <label>Région</label>
            <select name="region" required>
                <option value="">Sélectionnez une région</option>
                <option value="Adamaoua">Adamaoua</option>
                <option value="Centre">Centre</option>
                <option value="Est">Est</option>
                <option value="Extrême-Nord">Extrême-Nord</option>
                <option value="Littoral">Littoral</option>
                <option value="Nord">Nord</option>
                <option value="Nord-Ouest">Nord-Ouest</option>
                <option value="Ouest">Ouest</option>
                <option value="Sud">Sud</option>
                <option value="Sud-Ouest">Sud-Ouest</option>
            </select>
        </div>

        <div class="group">
            <label>Ville</label>
            <input type="text" name="ville" required placeholder="Ex: Yaoundé, Douala, Bafoussam...">
        </div>

        <div class="group">
            <label>Quartier / Zone de collecte</label>
            <input type="text" name="quartier" required placeholder="Ex: Simbock, Bastos...">
        </div>

        <div class="group">
            <label>Type de Vaccin</label>
            <select name="typeVaccin">
                <option value="BCG">BCG (Tuberculose)</option>
                <option value="VPO">VPO (Polio)</option>
                <option value="DTC">DTC (Diphtérie-Tétanos-Coqueluche)</option>
                <option value="VAR">VAR (Rougeole/Rubéole)</option>
            </select>
        </div>

        <div class="group">
            <label>Contexte de l'acte</label>
            <select name="contexte" id="contexteSelect">
                <option value="CAMPAGNE">📢 Campagne (Porte-à-porte / École)</option>
                <option value="ROUTINE">🏥 Routine (Hôpital / Centre de santé)</option>
            </select>
        </div>

        <div class="group" id="champHopital" style="display: none;">
            <label>Nom de l'Hôpital</label>
            <input type="text" name="hopital" list="listeHopitaux" placeholder="Sélectionnez ou tapez le nom">
            <datalist id="listeHopitaux">
                <option value="Hôpital Central de Yaoundé">
                <option value="HGOPY (Hôpital Général Yaoundé)">
                <option value="Hôpital Laquintinie de Douala">
                <option value="Hôpital Général de Douala">
                <option value="CHR de Garoua">
                <option value="Hôpital Régional de Bafoussam">
                <option value="Centre Hospitalier Universitaire (CHU)">
            </datalist>
        </div>

        <button type="submit">Enregistrer la vaccination</button>
    </form>
</div>

<script>
    // Petit script pour afficher/masquer le champ hôpital
    const selectContexte = document.getElementById('contexteSelect');
    const divHopital = document.getElementById('champHopital');

    selectContexte.addEventListener('change', function() {
        if (this.value === 'ROUTINE') {
            divHopital.style.display = 'block'; // Afficher
        } else {
            divHopital.style.display = 'none';  // Masquer
        }
    });
</script>

</body>
</html>
